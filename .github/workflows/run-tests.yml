name: Go CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: "1.24.2"
      - name: Install OpenGL and GLFW
        run: |
          sudo apt update
          sudo apt install -y libgl1-mesa-dev libglfw3-dev

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./...
